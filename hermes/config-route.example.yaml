# Merge into ~/.hermes/config.yaml (under platforms.webhook).
# INSECURE_NO_AUTH only works when the webhook binds to loopback — not 0.0.0.0.
#
# The eventmaster connector POSTs two distinct payload shapes to this route,
# discriminated by the X-Eventmaster-Channel header ("events" or "warnings"):
#
#   Events  : { instructions, triggered_at, hasErrors, newEvents, health }
#   Warnings: { instructions, triggered_at, current, resolved }
#
# The prompt below renders both — Hermes substitutes missing fields as empty
# strings, so an events payload simply leaves current/resolved blank and a
# warnings payload leaves hasErrors/newEvents/health blank. The agent prompt
# (agent-prompt.txt) tells the model how to branch.

platforms:
  webhook:
    extra:
      host: "127.0.0.1"
      routes:
        eventmaster:
          secret: "INSECURE_NO_AUTH"
          deliver: slack
          deliver_extra:
            # Slack DM channel id (D…), not user id (U…). From a successful test run: D0AM220AB6U.
            # Verify: ask Hermes to run send_message(action='list') or check Slack DM channel details.
            chat_id: "D0AM220AB6U"
          prompt: |
            {instructions}

            ---
            hasErrors: {hasErrors}

            newEvents:
            {newEvents}

            health:
            {health}

            current:
            {current}

            resolved:
            {resolved}
